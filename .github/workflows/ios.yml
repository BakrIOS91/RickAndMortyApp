name: iOS starter workflow

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    name: Build and Test default scheme using iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default > default
          echo Using default scheme: $default

      - name: Build and Run Unit Tests
        run: |
          scheme=$(cat default)
          # Select first available iPhone simulator
          device=$(xcrun simctl list devices available | grep -oE 'iPhone .* \([0-9A-F-]+\)' | head -1 | awk '{$1=$1;print}' | sed -e "s/ ([0-9A-F-]\+)//")
          
          # Detect workspace or project
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then 
            filetype_parameter="workspace"
            file_to_build="`ls -A | grep -i \\.xcworkspace\$`"
          else 
            filetype_parameter="project"
            file_to_build="`ls -A | grep -i \\.xcodeproj\$`"
          fi
          
          file_to_build=$(echo $file_to_build | awk '{$1=$1;print}')
          
          # Build and test
          xcodebuild test -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -destination "platform=iOS Simulator,name=$device"
